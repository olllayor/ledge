name: Nightly Changelog

# Each night at 03:00 UTC (08:00 Asia/Tashkent), review the commits that landed
# on main during the previous calendar day (UTC) and open a PR that updates
# CHANGELOG.md with anything users should know. Manual trigger is exposed for
# ad-hoc runs and dry-runs.

on:
  schedule:
    # 03:00 UTC daily. GitHub may delay scheduled runs by up to ~30 min if
    # the runner pool is busy; this is fine for a "previous day" digest.
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print the rendered changelog without committing or opening a PR'
        required: false
        default: 'false'
      since:
        description: 'Override the start of the diff window (ISO date or relative). Defaults to yesterday 00:00 UTC.'
        required: false
        default: ''
      until:
        description: 'Override the end of the diff window. Defaults to today 00:00 UTC.'
        required: false
        default: ''

concurrency:
  # One nightly run at a time. Re-running on the same day reuses the same
  # branch so we don't open duplicate PRs.
  group: ledge-changelog-nightly
  cancel-in-progress: false

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve diff window
        id: window
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.since }}" ]; then
            SINCE="${{ github.event.inputs.since }}"
          else
            # Yesterday at 00:00 UTC.
            SINCE="$(date -u -d 'yesterday 00:00:00' +'%Y-%m-%dT%H:%M:%SZ')"
          fi
          if [ -n "${{ github.event.inputs.until }}" ]; then
            UNTIL="${{ github.event.inputs.until }}"
          else
            # Today at 00:00 UTC.
            UNTIL="$(date -u -d 'today 00:00:00' +'%Y-%m-%dT%H:%M:%SZ')"
          fi
          echo "since=${SINCE}" >> "$GITHUB_OUTPUT"
          echo "until=${UNTIL}" >> "$GITHUB_OUTPUT"
          echo "Diff window: ${SINCE} .. ${UNTIL}"

      - name: Build changelog
        id: build
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          SINCE="${{ steps.window.outputs.since }}"
          UNTIL="${{ steps.window.outputs.until }}"
          echo "Filtering commits with author/committer date in [${SINCE}, ${UNTIL})"
          node scripts/build-changelog.mjs --since "${SINCE}" --until "${UNTIL}"
          if [ "${DRY_RUN}" = "true" ]; then
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
            echo "--- DRY RUN: CHANGELOG.md would be updated with: ---"
            git --no-pager diff -- CHANGELOG.md || true
            exit 0
          fi
          # git diff --quiet misses untracked files; CHANGELOG.md is
          # untracked on the very first run, so use git status instead.
          if [ -z "$(git status --porcelain -- CHANGELOG.md)" ]; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            echo "No new user-visible commits in window; nothing to do."
            exit 0
          fi
          echo "no_changes=false" >> "$GITHUB_OUTPUT"

      - name: Open PR
        if: steps.build.outputs.no_changes != 'true' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SINCE: ${{ steps.window.outputs.since }}
          UNTIL: ${{ steps.window.outputs.until }}
        run: |
          set -euo pipefail
          STAMP=$(date -u +'%Y-%m-%d-%H%M%S')
          BRANCH="changelog/nightly-${STAMP}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add CHANGELOG.md
          git commit -m "docs(changelog): nightly digest for ${UNTIL:0:10}" \
            -m "Window: ${SINCE} .. ${UNTIL}"
          git push origin "HEAD:${BRANCH}"

          # Summarize the diff for the PR body.
          SUMMARY=$(git --no-pager diff --stat -- CHANGELOG.md || true)
          BODY=$(cat <<PRBODY
          ## Nightly changelog digest

          _Generated by the \`Nightly Changelog\` workflow._

          - **Run:** ${STAMP} UTC
          - **Window:** \`${SINCE}\` → \`${UNTIL}\`

          ### Files changed

          ${SUMMARY}

          Merge this PR to roll the entries into \`main\`. PRs are coalesced by branch name, so re-running for the same day reuses this branch.

          PRBODY
          )
          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "docs(changelog): nightly digest for ${UNTIL:0:10}" \
            --body "${BODY}" \
            --label "documentation" \
            --label "automation"
