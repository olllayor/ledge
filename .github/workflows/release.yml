name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & Package
        run: pnpm dist

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Ledge-dmg
          path: dist/mac-arm64/Ledge-*.dmg

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Ledge-zip
          path: dist/mac-arm64/Ledge-*.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/mac-arm64/Ledge-*.dmg
            dist/mac-arm64/Ledge-*.zip