name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v0.1.2). If omitted, uses the package.json version.'
        required: false
        default: ''

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get version
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Resolve release tag
        id: release-tag
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
          elif [ -n "${{ github.event.inputs.tag_name }}" ]; then
            tag="${{ github.event.inputs.tag_name }}"
          else
            tag="v${{ steps.package-version.outputs.version }}"
          fi

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            tag_exists=true
          else
            tag_exists=false
          fi

          should_release=true
          if [ "${GITHUB_REF_TYPE}" = "branch" ] && [ "${tag_exists}" = "true" ]; then
            should_release=false
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "tag_exists=${tag_exists}" >> "$GITHUB_OUTPUT"
          echo "should_release=${should_release}" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        if: steps.release-tag.outputs.should_release == 'true' && steps.release-tag.outputs.tag_exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.release-tag.outputs.tag }}" "${GITHUB_SHA}"
          git push origin "refs/tags/${{ steps.release-tag.outputs.tag }}"

      - name: Build & Package
        if: steps.release-tag.outputs.should_release == 'true'
        run: pnpm dist

      - name: List artifacts
        if: steps.release-tag.outputs.should_release == 'true'
        run: ls -R dist/

      - name: Upload DMG
        if: steps.release-tag.outputs.should_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Ledge-dmg
          path: dist/*.dmg

      - name: Upload ZIP
        if: steps.release-tag.outputs.should_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Ledge-zip
          path: dist/*.zip

      - name: Create Release
        if: steps.release-tag.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.zip
