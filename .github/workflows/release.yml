name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v0.1.2). If omitted, uses the package.json version.'
        required: false
        default: ''

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get version
        id: package-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Build & Package
        run: pnpm dist

      - name: List artifacts
        run: ls -R dist/

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Ledge-dmg
          path: dist/*.dmg

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Ledge-zip
          path: dist/*.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || format('v{0}', steps.package-version.outputs.version) }}
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.zip
